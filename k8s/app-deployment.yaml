apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todo-app

  template:
    metadata:
      labels:
        app: todo-app

    spec:
      containers:
      - name: todo-app

        image: rajv2005/todo-app:v1

        ports:
        - containerPort: 5000

        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/todo